<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="24" fill="#0B0E14"/>
  <defs>
    <linearGradient id="vg" x1="26" y1="68" x2="80" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B8DEF"/><stop offset="1" stop-color="#86B4FF"/>
    </linearGradient>
  </defs>
  <!-- checkmark = two agreement vectors meeting at the consensus focal node -->
  <path d="M26 50 L44 68 L80 28" stroke="url(#vg)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="44" cy="68" r="15" fill="none" stroke="#3DDC97" stroke-width="2.5" opacity="0.45">
    <animate attributeName="r" values="13;18;13" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="68" r="9" fill="#3DDC97"/>
</svg>
